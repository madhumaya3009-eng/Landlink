<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
<title>Booking | Landlink</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.booking-container{
    width:450px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
.booking-container h2{
    text-align:center;
    color:#051a3b;
    margin-bottom:25px;
    font-size:28px;
}
.booking-container label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    color:#444;
    font-weight:600;
}
.booking-container input,
.booking-container textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:.3s;
}
.booking-container input:focus,
.booking-container textarea:focus{
    border-color:#03142d;
    box-shadow:0 0 8px rgba(13,110,253,.2);
}
.booking-container textarea{
    resize:none;
    height:100px;
}
.booking-container button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#031736;
    color:#fff;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}
.booking-container button:hover{
    background:#031837;
    transform:translateY(-2px);
}
nav{
    display:flex;
    justify-content:space-between;
    padding:18px 8%;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2E8B57;
}
@media(max-width:500px){

    .booking-container{
        width:90%;
        padding:25px;
    }

    .booking-container h2{
        font-size:24px;
    }

}
    </style>
</head>
<body>
    <div class="booking-container">
        
    <h2>Book Property</h2>

    <form action="/confirm_booking" method="POST">

        <input type="hidden" name="property_id" value="{{ property[0] }}">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="text" name="phone" required>

        <label>Address</label>
        <textarea name="address" required></textarea>

        <button onclick="showMessage()" type="submit">
            Confirm Booking
        </button>

    </form>

</div>
</body>
</html>
<script>
    function showMessage(){
        alert("Your Booking reguest is given!We will contact you soon!!")
    }
</script>
