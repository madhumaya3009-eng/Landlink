<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }
    body{
        height:100vh;
        background:
        linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
        url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80");
        background-size:cover;
        background-position:center;
    }
    .container{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }
    .card{
        width:420px;
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 20px rgba(0,0,0,.3);
    }
    .card h1{
        text-align:center;
        color:rgb(2, 5, 47);
        margin-bottom:20px;
    }
    input,select{
        width:100%;
        padding:12px;
        margin-top:8px;
        margin-bottom:18px;
        border-radius:8px;
        border:1px solid gray;
        font-size:16px;
    }
    button{
        width:100%;
        padding:14px;
        background:rgb(2, 5, 47);
        color:white;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
    }
    button:hover{
        background:rgb(6, 12, 83);
    }
    .login{
        text-align:center;
        margin-top:20px;
    }
    .login a{
        color:rgb(2, 5, 47);
        text-decoration:none;
        font-weight:bold;
    }
    .error{
        color:red;
        text-align:center;
        margin-bottom:15px;
    }
    nav{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px 8%;
        background:white;
        box-shadow:0 2px 10px rgba(0,0,0,.1);
    }
    .logo{
        font-size:28px;
        font-weight:bold;
        color:#2E8B57;
    }
    footer{
        background:#1f2937;
        color:white;
        margin-top:60px;
        padding:50px 8% 20px;
    }
    .footer-container{
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:40px;
    }
    .footer-box{
        flex:1;
        min-width:220px;
    }
    .footer-box h2,
    .footer-box h3{
        margin-bottom:18px;
        color:#2E8B57;
    }
    .footer-box p{
        color:#ddd;
        line-height:1.8;
    }
    .footer-box a{
        display:block;
        text-decoration:none;
        color:#ddd;
        margin:10px 0;
        transition:.3s;
    }
    .footer-box a:hover{
        color:#2E8B57;
        padding-left:5px;
    }
    .footer-box i{
        color:#2E8B57;
        margin-right:8px;
    }
    footer hr{
        margin:30px 0 15px;
        border:none;
        border-top:1px solid #555;
    }
    .copyright{
        text-align:center;
        color:#bbb;
        font-size:15px;
    }
@media (max-width:768px){
    body{
        min-height:100vh;
    }

    nav{
        flex-direction:column;
        padding:15px;
    }

    .logo{
        font-size:24px;
    }
    .container{
        min-height:70vh;
        padding:20px;
    }

    .card{
        width:100%;
        max-width:350px;
        padding:25px;
        border-radius:15px;
    }

    .card h1{
        font-size:28px;
    }

    input,
    select{
        font-size:15px;
        padding:12px;
    }

    button{
        font-size:16px;
        padding:14px;
    }

    .login{
        font-size:15px;
    }
    footer{
        margin-top:40px;
        padding:35px 20px;
    }

    .footer-container{
        flex-direction:column;
        text-align:center;
        gap:25px;
    }

    .footer-box{
        min-width:100%;
    }

    .footer-box a{
        display:inline-block;
        margin:6px;
    }

    .footer-box p{
        text-align:center;
    }

    .copyright{
        font-size:14px;
    }

}
</style>
<script>
function validateForm(){
    let pass=document.getElementById("password").value;
    let cpass=document.getElementById("confirm").value;
    if(pass!=cpass){
        alert("Passwords do not match");
        return false;
    }
    return true;
}
</script>
</head>
<body>
    <nav>
        <div class="logo">
        🏡 Landlink
        </div>
    </nav>
<div class="container">
    <div class="card">
    <h1>Create Account</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/register" method="POST" onsubmit="return validateForm()">
        <label>Username</label>
        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>
        <label>Password</label>
        <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter Password"
        required>
        <label>Confirm Password</label>
        <input
        type="password"
        id="confirm"
        placeholder="Confirm Password"
        required>
        <label>Select Role</label>
        <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>
        <button type="submit">Register</button>
    </form>
    </div>
</div>
</body>
</html>
